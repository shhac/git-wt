name: Test

on:
  push:
    branches: [main, migrate-to-go]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o git-wt ./cmd/git-wt

      - name: Smoke test
        run: |
          ./git-wt --version
          ./git-wt --help
          ./git-wt list
          ./git-wt alias gwt > /tmp/alias.sh
          grep -q 'gwt() {' /tmp/alias.sh
