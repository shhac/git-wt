name: CI

on:
  push:
    branches: [main, migrate-to-go]
  pull_request:

jobs:
  unit:
    name: build + test (short) + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test (short)
        run: make test-short

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Full test suite (incl. e2e)
        run: make test
